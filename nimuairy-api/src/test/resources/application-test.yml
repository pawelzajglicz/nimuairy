spring:
  datasource:
    url: jdbc:h2:mem:nimuairy-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.xml

jwt:
  secret: test-jwt-secret-key-for-unit-tests-min-32-chars
  expiration-ms: 3600000
